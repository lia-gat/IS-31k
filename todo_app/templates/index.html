<!DOCTYPE html>
<html>
<head>
 <title>Список дел</title>
 <style>
   /* ПУНКТ 2: Сделать фон страницы светло-серым, а заголовок — синим */
   body { 
     font-family: Arial; 
     margin: 40px; 
     background-color: lightgray; 
   }
   h1 { 
     color: blue; 
   }
   .done { text-decoration: line-through; color: gray; }
   ul { list-style: none; padding: 0; }
   li { margin: 10px 0; }
 </style>
</head>
<body>
 <h1>Мои задачи</h1>
 
 <!-- ПУНКТ 1: Кнопка "Очистить всё", которая удаляет все задачи -->
 <form action="/clear_all" method="POST" style="margin-bottom: 20px;">
   <button type="submit">Очистить всё</button>
 </form>
 
 <ul>
 {% for task in tasks %}
  <li>
    {{ task.text }} — <small>{{ task.date }}</small>
    <a href="/edit/{{ loop.index0 }}"> Редактировать</a>
    <a href="/delete/{{ loop.index0 }}"> Удалить</a>
</li>

 {% endfor %}
 </ul>

 <h2>Добавить задачу</h2>
 <form method="POST" action="/add">
  <input type="text" name="task" placeholder="Новая задача" required>
  <button type="submit">Добавить</button>
 </form>
</body>
</html>
